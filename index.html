<body>
    <h1>🎀  𝐻𝒾, 𝐼 𝒶𝓂 𝒶 𝒱𝑒𝓇🏵𝓃𝒾𝓀𝒶  🎀  </h1>
    <h1>ᵢ wᵢₗₗ bₑ ₒᵥₑᵣₛₑₑᵢₙg yₒᵤᵣ Cybₑᵣₚᵤₙₖ ₂₀₇₇ gₐₘₑₚₗₐy </h1>

    <p>𝔞𝔲𝔯𝔞 𝔰𝔥𝔞𝔯𝔦𝔫𝔤 𝔦𝔰 𝔞𝔲𝔯𝔞 𝔠𝔞𝔯𝔦𝔫𝔤</p>
    <p>♥ 𝖕𝖗𝖊𝖑𝖎𝖘𝖙𝖆𝖏 𝖌𝖎𝖋𝖔𝖛𝖊 ♥</p>

    <button onclick="gothicConfetti()">Jeej 💀</button>

    <div id="darknessText">YOU SUMMONED DARKNESS</div>
     <script>
        function gothicConfetti() {
            const symbols = ["💀", "🖤", "❤️", "🩸"];

            for (let i = 0; i < 40; i++) {
                const el = document.createElement("div");
                el.classList.add("particle");

                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];

                el.style.left = "50%";
                el.style.top = "50%";

                el.style.setProperty("--x", (Math.random() * 500 - 250) + "px");
                el.style.setProperty("--y", (Math.random() * 500 - 250) + "px");

                document.body.appendChild(el);

                setTimeout(() => el.remove(), 1500);
            }

            const text = document.getElementById("darknessText");
            text.style.opacity = "1";

            setTimeout(() => {
                text.style.opacity = "0";
            }, 2000);
        }
    </script>
</body>
</html>

<audio id="music" loop>
    <source src="home menu.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()" id="musicBtn">
    Pusti glazbu 🎵 </button>

<script>
function toggleMusic() {
    const music = document.getElementById("music");
    const btn = document.getElementById("musicBtn");

    if (music.paused) {
        music.play();
        btn.textContent = "Pauziraj glazbu ⏸️";
    } else {
        music.pause();
        btn.textContent = "Pusti glazbu 🎵";
    }
}
</script>
    <!DOCTYPE html>
<html>
<head>
    <title>GIF prezentacija</title>
</head>
<body>

    <img id="gif" src="gif1.gif" width="500">

    <br><br>

    <button onclick="prethodniGif()">Prethodni</button>
    <button onclick="sljedeciGif()">Sljedeći</button>

    <script>
        const gifovi = [
            "gif1.gif",
            "gif2.gif",
            "gif3.gif",
            "gif4.gif",
            "gif5.gif",
            "gif6.gif",
        ];

        let trenutni = 0;

        function sljedeciGif() {
            trenutni++;

            if (trenutni >= gifovi.length) {
                trenutni = 0;
            }

            document.getElementById("gif").src = gifovi[trenutni];
        }

        function prethodniGif() {
            trenutni--;

            if (trenutni < 0) {
                trenutni = gifovi.length - 1;
            }

            document.getElementById("gif").src = gifovi[trenutni];
        }
    </script>
</body>
</html>
