<!DOCTYPE html>
<html lang="hr">
<head><link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veronikini</title>
</head>
<body>
    <h1>Bok, ja sam Veronika!</h1>
    <h1>proba proba</h1>

    <p>Ovo je moja prva web stranica.</p>

    <h2>Moji hobiji</h2>
    <ul>
        <li>Programiranje</li>
        <li>Putovanja</li>
        <li>Glazba</li>
        <li>Rolanje</li>
    </ul>
<audio id="music" loop>
    <source src="home menu.mp3" type="audio/mpeg">
</audio>
<style>
.btn {
    background: linear-gradient(45deg, #ff6b6b, #ff8e53);
    color: white;
    border: none;
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.2s;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.btn:active {
    transform: translateY(0px);
}
</style>
<button onclick="toggleMusic()" id="musicBtn">
    Pusti glazbu 🎵
</button>

<script>
function toggleMusic() {
    const music = document.getElementById("music");
    const btn = document.getElementById("musicBtn");

    if (music.paused) {
        music.play();
        btn.textContent = "Pauziraj glazbu ⏸️";
    } else {
        music.pause();
        btn.textContent = "Pusti glazbu 🎵";
    }
}
</script>
    <!DOCTYPE html>
<html>
<head>
    <title>GIF prezentacija</title>
</head>
<body>

    <img id="gif" src="gif1.gif" width="500">

    <br><br>

    <button onclick="prethodniGif()">Prethodni</button>
    <button onclick="sljedeciGif()">Sljedeći</button>

    <script>
        const gifovi = [
            "gif1.gif",
            "gif2.gif",
            "gif3.gif",
            "gif4.gif",
            "gif5.gif",
            "gif6.gif",
        ];

        let trenutni = 0;

        function sljedeciGif() {
            trenutni++;

            if (trenutni >= gifovi.length) {
                trenutni = 0;
            }

            document.getElementById("gif").src = gifovi[trenutni];
        }

        function prethodniGif() {
            trenutni--;

            if (trenutni < 0) {
                trenutni = gifovi.length - 1;
            }

            document.getElementById("gif").src = gifovi[trenutni];
        }
    </script>

</body>
</html>
